name: Real Extractor Models

on:
  schedule:
    - cron: "41 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  real-models:
    name: spaCy and GLiNER integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Cache model downloads
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.0.0
        with:
          path: ~/.cache/huggingface
          key: extractor-models-${{ runner.os }}-${{ hashFiles('uv.lock') }}
      - name: Install extractor extras
        run: uv sync --locked --group dev --extra ner --extra gliner
      - name: Verify optional models are installed
        run: uv run python -c "import en_core_web_sm, gliner"
      - name: Run real-model regression tests
        run: uv run pytest -m slow tests/integration/test_extractors_real.py
