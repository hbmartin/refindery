name: Lint and Test
on: push

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    services:
      qdrant:
        image: qdrant/qdrant:v1.18.2
        ports:
          - 6333:6333
          - 6334:6334
    env:
      QDRANT_URL: http://localhost:6333
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
    - name: Create uv environment
      run: uv venv
    - name: Install dependencies
      run: uv sync --all-groups
    - run: uv run ruff check .
    - run: uv run ruff format --check .
    - name: Run type checks
      run: |
        uv run ty check src tests
        uv run pyrefly check src tests
    - name: Run complexity checks
      run: uv run lizard --languages python src
    - name: Run package metadata checks
      run: uv run pyroma --min 10 .
    - run: uv run deptry src
    - name: Run tests with coverage
      run: uv run pytest --cov=refindery --cov-report=lcov --cov-report=html
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Upload coverage report as artifact
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-report-python-${{ matrix.python-version }}
        path: htmlcov/
        retention-days: 30
