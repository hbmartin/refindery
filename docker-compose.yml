services:
  # The app image is optional: `docker compose up -d qdrant` alone keeps the
  # host-python Docker profile working. `docker compose up -d` builds and
  # runs the whole stack; set REFINDERY_AUTH_TOKEN and provider keys first.
  app:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # startup fails with a clear ValidationError when no token is set
      REFINDERY_AUTH_TOKEN: "${REFINDERY_AUTH_TOKEN:?set REFINDERY_AUTH_TOKEN before starting the app}"
      # Keep the container stack on Qdrant even when a host .env selects LanceDB.
      REFINDERY_VECTOR_STORE: qdrant
      REFINDERY_QDRANT__URL: http://qdrant:6333
      REFINDERY_QDRANT__COLLECTION: "${REFINDERY_QDRANT__COLLECTION:-refindery_chunks}"
      REFINDERY_EMBEDDER__PROVIDER: "${REFINDERY_EMBEDDER__PROVIDER:-voyage}"
      REFINDERY_EMBEDDER__MODEL: "${REFINDERY_EMBEDDER__MODEL:-voyage-3.5}"
      REFINDERY_EMBEDDER__DIM: "${REFINDERY_EMBEDDER__DIM:-1024}"
      REFINDERY_EMBEDDER__MAX_INPUT_TOKENS: "${REFINDERY_EMBEDDER__MAX_INPUT_TOKENS:-32000}"
      REFINDERY_RERANKER__KIND: "${REFINDERY_RERANKER__KIND:-api}"
      REFINDERY_RERANKER__PROVIDER: "${REFINDERY_RERANKER__PROVIDER:-voyage}"
      REFINDERY_RERANKER__MODEL: "${REFINDERY_RERANKER__MODEL:-rerank-2.5}"
      REFINDERY_ENTITY__EXTRACTOR_CHAIN: '${REFINDERY_ENTITY__EXTRACTOR_CHAIN:-["spacy"]}'
      # Observability on by default in the stack: metrics are always exported
      # (Prometheus scrapes them below); tracing emits console spans to the
      # container logs. Set otlp + OTLP_ENDPOINT if you add a collector.
      REFINDERY_OBSERVABILITY__TRACES: "${REFINDERY_OBSERVABILITY__TRACES:-console}"
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
    volumes:
      - refindery_data:/data
      - refindery_models:/models
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.18.2
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  # Scrapes the app's authenticated /metrics. Prometheus can't expand env vars
  # in its config, so the entrypoint writes REFINDERY_AUTH_TOKEN to the
  # credentials_file the scrape config reads, then execs prometheus.
  prometheus:
    image: prom/prometheus:v3.6.0
    entrypoint:
      - /bin/sh
      - -c
      - >
        (umask 077 &&
        printf '%s' "$${REFINDERY_AUTH_TOKEN}" > /tmp/refindery-prometheus-token) &&
        exec /bin/prometheus
        --config.file=/etc/prometheus/prometheus.yml
        --storage.tsdb.path=/prometheus
    environment:
      REFINDERY_AUTH_TOKEN: "${REFINDERY_AUTH_TOKEN:?set REFINDERY_AUTH_TOKEN before starting prometheus}"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app

  # Ollama for local embeddings / LLM labeling (v2; uncomment to enable).
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "127.0.0.1:11434:11434"
  #   volumes:
  #     - ollama_models:/root/.ollama

volumes:
  refindery_data:
  refindery_models:
  qdrant_storage:
  prometheus_data:
  # ollama_models:
