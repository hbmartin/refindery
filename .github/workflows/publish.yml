name: Publish Python Package

on:
  release:
    types: [created]

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.13'
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
    - name: Install locked dependencies
      run: uv sync --locked --all-groups
    - name: Run tests before build
      run: uv run pytest -m "not external"
    - name: Fetch cockpit admin UI bundle
      # Downloads the pinned static bundle (COCKPIT_UI_VERSION) into
      # src/refindery/api/static/admin so uv_build includes it in the wheel and
      # `refindery serve` exposes the UI at /admin. github.token can read a
      # public refindery-cockpit; a private repo needs a PAT secret with read
      # access to it exported as GH_TOKEN instead.
      env:
        GH_TOKEN: ${{ github.token }}
      run: bash scripts/fetch-cockpit-ui.sh
    - name: Build distributions
      run: uv build
    - name: Check distributions
      run: uv run twine check dist/*
    - name: Upload distributions as artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: python-distributions
        path: dist/
        if-no-files-found: error
    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
