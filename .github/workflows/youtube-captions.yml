name: Real YouTube Captions

# Scheduled (not merge-gating): YouTube/network tests are inherently flaky
# and must never block PRs.
on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  youtube-captions:
    name: yt-dlp caption integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install youtube extra
        run: uv sync --locked --group dev --extra youtube
      - name: Verify yt-dlp is installed
        run: uv run python -c "import yt_dlp"
      - name: Run real caption regression tests
        run: uv run pytest -m "slow and external" tests/integration/test_youtube_captions_real.py
